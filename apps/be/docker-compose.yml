services:
  rag-postgres:
    image: pgvector/pgvector:pg17
    container_name: rai-agent-rag-postgres
    environment:
      POSTGRES_USER: rai
      POSTGRES_PASSWORD: rai
      POSTGRES_DB: rai_rag
    ports:
      - "5432:5432"
    volumes:
      - ragpgdata:/var/lib/postgresql/data
      - ./infra/postgres/rag-init.sql:/docker-entrypoint-initdb.d/rag-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rai -d rai_rag"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ragpgdata:
